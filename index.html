<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expense Tracker</h1>

        <div class="form">
            <input type="text" id="expense-name" placeholder="Enter expenses">
            <input type="number" id="expense-amount" placeholder="Amount">
           <select id="expense-category">
             <option value="" disabled selected> Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Others">Others</option>
                  </select>
            <input type="date" id="expense-date" placeholder="Date">

            <button onclick="addExpense()">Add Expense</button>
            
        </div>

        <table>
            <thead>
                <tr>
                    <th>Expenses</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="expense-list">

            </tbody>
        </table>
    </div>
    <div class="filter-group">
        <div>
            <label for="category-filter">
                Filter by Category
            </label>
            <select id="filter-category">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Others">Others</option>
            </select>
        </div>
    </div>

    <!-- edit popup-->
     <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2> Edit Expense</h2>
             <input type="text" id="edit-expense-name" placeholder="Enter expenses">
            <input type="number" id="edit-expense-amount" placeholder="Amount">
           <select id="edit-expense-category">
             <option value="" disabled selected> Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Others">Others</option>
                  </select>
            <input type="date" id="edit-expense-date" placeholder="Date">

            <button class="confirm-btn" id="confirm-edit">Save changes</button>
            <button class="cancel-btn"
            oneclick="closeModal('edit-modal')">Cancel</button>
            

        </div>
     </div>
     <!--delete popup-->
     <div id="delete-modal" class="modal">
        <div class="modal-content">
            <h2>Confirm Delete</h2>
            <p> Are you sure you want to delete this expense?</p>
            <button class="cancell-btn"
            id="confirm-delete">Yes,Delete</button>
            <button class="cancel-btn"
            oneclick="closeModal('delete-modal')"> Cancel</button>
        </div>
     </div>

    <div class="chart-container">
    <h2>Monthly Expense Chart</h2>
    <canvas id="expenseChart"></canvas>
</div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
